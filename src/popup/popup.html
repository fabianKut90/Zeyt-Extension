<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>zeyt</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        --open-bg: #F6F3EE;
        --open-fg: #2C3640;
        --open-sub: #7A817D;
        --open-eyebrow: #9AA19D;
        --open-divider: #E8E4DE;
        --open-button-bg: #46545D;
        --open-button-text: #F7F4EF;
        --open-chip-bg: rgba(70, 84, 93, 0.08);
        --open-chip-border: rgba(70, 84, 93, 0.16);
        --open-chip-text: #46545D;
        width: 320px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #F6F3EE;
        color: #2C3640;
        transition: background 0.25s ease, color 0.25s ease;
      }

      /* ── Mode skins ─────────────────────────────────────────────────────── */
      body.still-mode  { background: #1D2A33; color: #F6F3EE; }
      body.open-mode   { background: var(--open-bg); color: var(--open-fg); }
      body.open-mode[data-dock-color="white-marble"] {
        --open-bg: #F8F7F4;
        --open-fg: #2A3239;
        --open-sub: #7B878F;
        --open-eyebrow: #97A0A5;
        --open-divider: #DDE2E4;
        --open-button-bg: #31424C;
        --open-button-text: #F8F7F4;
        --open-chip-bg: rgba(49, 66, 76, 0.08);
        --open-chip-border: rgba(49, 66, 76, 0.16);
        --open-chip-text: #31424C;
      }
      body.open-mode[data-dock-color="slate-marble"] {
        --open-bg: #EEF3F1;
        --open-fg: #294047;
        --open-sub: #6A8082;
        --open-eyebrow: #819592;
        --open-divider: #D5E2DE;
        --open-button-bg: #355159;
        --open-button-text: #F3F7F6;
        --open-chip-bg: rgba(53, 81, 89, 0.08);
        --open-chip-border: rgba(53, 81, 89, 0.16);
        --open-chip-text: #355159;
      }
      body.open-mode[data-dock-color="muted-blue"] {
        --open-bg: #EDF2F4;
        --open-fg: #2D414A;
        --open-sub: #70838B;
        --open-eyebrow: #8898A0;
        --open-divider: #D9E2E6;
        --open-button-bg: #48636E;
        --open-button-text: #F3F7F8;
        --open-chip-bg: rgba(72, 99, 110, 0.08);
        --open-chip-border: rgba(72, 99, 110, 0.16);
        --open-chip-text: #48636E;
      }
      body.open-mode[data-dock-color="muted-green"] {
        --open-bg: #EEF1EE;
        --open-fg: #34413B;
        --open-sub: #78817A;
        --open-eyebrow: #8A918B;
        --open-divider: #DEE4DE;
        --open-button-bg: #5F6C65;
        --open-button-text: #F3F5F2;
        --open-chip-bg: rgba(95, 108, 101, 0.08);
        --open-chip-border: rgba(95, 108, 101, 0.16);
        --open-chip-text: #5F6C65;
      }
      body.open-mode[data-dock-color="muted-purple"] {
        --open-bg: #F2EEF3;
        --open-fg: #433A46;
        --open-sub: #85788A;
        --open-eyebrow: #9A8EA0;
        --open-divider: #E2DCE4;
        --open-button-bg: #67596B;
        --open-button-text: #F7F3F8;
        --open-chip-bg: rgba(103, 89, 107, 0.08);
        --open-chip-border: rgba(103, 89, 107, 0.16);
        --open-chip-text: #67596B;
      }

      /* ── Header ─────────────────────────────────────────────────────────── */
      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 16px 16px 0;
      }
      .header img:first-child { width: 28px; height: 28px; border-radius: 7px; }
      .header-name  { display: flex; align-items: center; flex: 1; min-width: 0; }
      .header-wordmark { width: 68px; height: auto; display: block; }
      .header-wordmark-light { display: none; }
      .still-mode .header-wordmark-dark { display: none; }
      .still-mode .header-wordmark-light { display: block; }

      .link-indicator {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.5px;
        padding: 3px 8px;
        border-radius: 99px;
      }
      .link-indicator.on  { background: rgba(196,149,106,0.18); color: #C4956A; }
      .link-indicator.off { background: rgba(0,0,0,0.06); color: #9CA3AF; }
      .still-mode .link-indicator.on { background: rgba(196,149,106,0.25); }

      /* ── State block ─────────────────────────────────────────────────────── */
      .state-block { padding: 20px 16px 4px; }

      .state-eyebrow {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        margin-bottom: 5px;
      }
      .still-mode  .state-eyebrow { color: #C4956A; }
      .open-mode   .state-eyebrow { color: var(--open-eyebrow); }

      .state-title {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.6px;
        line-height: 1.05;
        margin-bottom: 8px;
      }
      .still-mode  .state-title { color: #F6F3EE; }
      .open-mode   .state-title { color: var(--open-fg); }

      .state-sub {
        font-size: 13px;
        line-height: 1.5;
      }
      .still-mode  .state-sub { color: rgba(126,143,156,0.92); }
      .open-mode   .state-sub { color: var(--open-sub); }

      /* ── Unlock chip ─────────────────────────────────────────────────────── */
      .unlock-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 14px;
        padding: 7px 12px;
        border-radius: 99px;
        background: rgba(255,255,255,0.09);
        font-size: 12px;
        font-weight: 600;
        color: #C4956A;
      }
      .unlock-chip svg { width: 13px; height: 13px; flex-shrink: 0; }

      .dock-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 12px;
        padding: 7px 12px;
        border-radius: 99px;
        background: var(--open-chip-bg);
        border: 1px solid var(--open-chip-border);
        font-size: 12px;
        font-weight: 600;
        color: var(--open-chip-text);
      }

      /* ── Divider ─────────────────────────────────────────────────────────── */
      .divider { height: 1px; margin: 14px 16px 0; }
      .still-mode .divider { background: rgba(255,255,255,0.1); }
      .open-mode  .divider { background: var(--open-divider); }

      /* ── Footer ──────────────────────────────────────────────────────────── */
      .footer { padding: 10px 16px 14px; }

      .btn-settings {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 9px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        transition: opacity 0.15s;
      }
      .still-mode .btn-settings {
        background: rgba(255,255,255,0.11);
        color: #F6F3EE;
      }
      .still-mode .btn-settings:hover { background: rgba(255,255,255,0.17); }
      .open-mode  .btn-settings {
        background: var(--open-button-bg);
        color: var(--open-button-text);
      }
      .open-mode  .btn-settings:hover { opacity: 0.88; }

      .sync-note {
        text-align: center;
        font-size: 10px;
        margin-top: 7px;
      }
      .still-mode .sync-note { color: rgba(126,143,156,0.56); }
      .open-mode  .sync-note { color: #D1D5DB; }

      /* ── Unlinked view ───────────────────────────────────────────────────── */
      .unlinked-wrap { padding: 24px 16px 20px; text-align: center; }
      .unlinked-logo { width: 52px; height: 52px; border-radius: 13px; margin-bottom: 14px; opacity: 0.5; }
      .unlinked-wordmark { width: 88px; margin: 0 auto 16px; display: block; }
      .unlinked-title { font-size: 15px; font-weight: 700; color: #1C1C1E; margin-bottom: 6px; }
      .unlinked-sub   { font-size: 12px; color: #9CA3AF; margin-bottom: 18px; line-height: 1.55; }

      .btn-primary {
        width: 100%;
        padding: 11px;
        background: #1D2A33;
        color: #fff;
        border: none;
        border-radius: 9px;
        font-size: 14px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .btn-primary:hover { opacity: 0.88; }

      /* ── Loading ─────────────────────────────────────────────────────────── */
      .loading-wrap { padding: 36px 16px; text-align: center; color: #D1D5DB; font-size: 13px; }

      .dev-sync-banner {
        display: none;
        margin: 12px 16px 0;
        padding: 12px;
        border-radius: 12px;
        background: #FEF3C7;
        border: 1px solid #FCD34D;
        color: #78350F;
      }
      .dev-sync-title {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .dev-sync-text { font-size: 12px; line-height: 1.45; margin-bottom: 10px; }
    </style>
  </head>
  <body class="open-mode">
    <div id="dev-sync-banner" class="dev-sync-banner">
      <div class="dev-sync-title">Dev Build</div>
      <div id="dev-sync-text" class="dev-sync-text"></div>
    </div>

    <!-- ── Paired ── -->
    <div id="view-paired" style="display:none">
      <div class="header">
        <img src="icons/icon48.png" alt="zeyt" />
        <span class="header-name">
          <img class="header-wordmark header-wordmark-dark" src="icons/zeyt-wordmark-dark.svg" alt="zeyt" />
          <img class="header-wordmark header-wordmark-light" src="icons/zeyt-wordmark-light.svg" alt="zeyt" />
        </span>
        <span class="link-indicator on">Linked</span>
      </div>

      <div class="state-block">
        <div class="state-eyebrow" id="state-eyebrow">Mode</div>
        <div class="state-title"   id="state-title">—</div>
        <div class="state-sub"     id="state-sub">—</div>
        <div class="dock-chip" id="dock-chip" style="display:none">
          Dock: <span id="dock-chip-label">—</span>
        </div>
        <div class="unlock-chip" id="unlock-chip" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="5" y="11" width="14" height="10" rx="2"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
          Unlock with NFC tap on your phone
        </div>
      </div>

      <div class="divider"></div>

      <div class="footer">
        <button class="btn-settings" id="btn-settings">Settings →</button>
        <div class="sync-note">Syncs on open · checks state when visiting blocked sites</div>
      </div>
    </div>

    <!-- ── Unlinked ── -->
    <div id="view-unlinked" style="display:none">
      <div class="unlinked-wrap">
        <img class="unlinked-logo" src="icons/icon48.png" alt="zeyt" />
        <img class="unlinked-wordmark" src="icons/zeyt-wordmark-dark.svg" alt="zeyt" />
        <div class="unlinked-title">No phone linked yet</div>
        <div class="unlinked-sub">Open Settings to scan the QR code with the zeyt app on your phone.</div>
        <button class="btn-primary" id="btn-open-settings">Open Settings</button>
      </div>
    </div>

    <!-- ── Loading ── -->
    <div id="view-loading">
      <div class="loading-wrap">Loading…</div>
    </div>

    <script src="../popup.js" type="module"></script>
  </body>
</html>
