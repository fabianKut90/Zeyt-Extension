<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>zeyt</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 300px;
        min-height: 180px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        color: #111827;
        background: #fff;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
      }
      .header img { width: 24px; height: 24px; border-radius: 5px; }
      .header-title { font-weight: 700; font-size: 16px; letter-spacing: -0.3px; }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 10px;
        border-radius: 9999px;
        font-size: 12px;
        font-weight: 600;
      }
      .badge-blocking { background: #fee2e2; color: #b91c1c; }
      .badge-idle     { background: #f3f4f6; color: #6b7280; }
      .badge-warning  { background: #fef3c7; color: #92400e; }
      .badge-linked   { background: #d1fae5; color: #065f46; }

      .status-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }

      .hint {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 6px;
        line-height: 1.4;
      }

      .delay-note {
        font-size: 11px;
        color: #d1d5db;
        margin-top: 8px;
        line-height: 1.4;
      }

      button {
        width: 100%;
        padding: 8px 14px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        margin-top: 10px;
        transition: background 0.15s;
      }
      .btn-primary { background: #3A4F3F; color: #fff; }
      .btn-primary:hover { background: #2e3f33; }
      .btn-ghost { background: #f3f4f6; color: #374151; }
      .btn-ghost:hover { background: #e5e7eb; }

      #qr-wrap {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        margin-top: 12px;
      }
      #qr-wrap canvas { border-radius: 6px; }
      .timer { font-size: 12px; color: #9ca3af; }

      .separator { height: 1px; background: #f3f4f6; margin: 12px 0; }

      #error-msg { color: #b91c1c; font-size: 12px; margin-top: 6px; display: none; }
    </style>
  </head>
  <body>
    <div class="header">
      <img src="icons/icon48.png" alt="zeyt" />
      <span class="header-title">zeyt</span>
    </div>

    <div id="view-paired" style="display:none">
      <div class="status-row">
        <span class="badge badge-linked">Linked</span>
        <span id="focus-badge"></span>
      </div>
      <p class="hint" id="focus-hint"></p>
      <p class="delay-note">Syncs when you open this popup or visit a blocked site</p>
      <div class="separator"></div>
      <button class="btn-ghost" id="btn-settings">Settings →</button>
    </div>

    <div id="view-pairing" style="display:none">
      <p style="color:#374151; margin-bottom:4px;">Scan with the zeyt app on your phone:</p>
      <div id="qr-wrap">
        <canvas id="qr-canvas"></canvas>
        <span class="timer" id="qr-timer"></span>
      </div>
      <p class="hint">Open zeyt on your phone and scan this code to link your devices.</p>
    </div>

    <div id="view-unlinked" style="display:none">
      <p class="hint" style="margin-bottom:4px;">No phone linked yet.</p>
      <button class="btn-primary" id="btn-pair">Link Phone App</button>
      <p id="error-msg"></p>
    </div>

    <div id="view-loading">
      <p class="hint">Loading…</p>
    </div>

    <script src="../popup.js" type="module"></script>
  </body>
</html>
