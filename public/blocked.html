<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Zeyt</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, rgba(196, 149, 106, 0.12), transparent 34%),
          #1D2A33;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #F6F3EE;
      }

      .wrap {
        text-align: center;
        max-width: 420px;
        padding: 0 24px;
      }

      /* Logo */
      .logo {
        width: 52px;
        height: 52px;
        border-radius: 13px;
        margin: 0 auto 20px;
        display: block;
        opacity: 0.92;
      }

      /* Eyebrow */
      .eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1.4px;
        text-transform: uppercase;
        color: #C4956A;
        margin-bottom: 10px;
      }

      /* Heading */
      h1 {
        font-size: 32px;
        font-weight: 800;
        letter-spacing: -0.6px;
        line-height: 1.05;
        color: #F6F3EE;
        margin-bottom: 12px;
      }

      /* Sub */
      .sub {
        font-size: 14px;
        color: rgba(126, 143, 156, 0.92);
        line-height: 1.6;
        margin-bottom: 24px;
      }

      /* Domain pill */
      .domain-pill {
        display: inline-block;
        padding: 6px 16px;
        background: rgba(196, 149, 106, 0.15);
        color: #C4956A;
        border-radius: 99px;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 28px;
        border: 1px solid rgba(196, 149, 106, 0.25);
      }

      /* Unlock note */
      .unlock-note {
        font-size: 13px;
        color: rgba(126, 143, 156, 0.78);
        margin-bottom: 32px;
        line-height: 1.5;
      }

      /* Check button */
      .btn-check {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 10px 22px;
        background: rgba(255, 255, 255, 0.1);
        color: #F6F3EE;
        border: 1px solid rgba(126, 143, 156, 0.22);
        border-radius: 99px;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-check:hover    { background: rgba(46, 58, 67, 0.92); }
      .btn-check:disabled { opacity: 0.4; cursor: default; }

      .refresh-msg {
        margin-top: 14px;
        font-size: 12px;
        color: rgba(126, 143, 156, 0.72);
        min-height: 18px;
      }

      /* Footer */
      .footer {
        margin-top: 48px;
      }

      .footer-wordmark {
        width: 74px;
        opacity: 0.46;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img class="logo" src="icons/icon48.png" alt="zeyt" />

      <div class="eyebrow">Still mode · active</div>
      <h1>Stay focused.</h1>

      <p class="sub">This site is blocked during<br>your current focus session.</p>

      <div class="domain-pill" id="domain">—</div>

      <p class="unlock-note" id="until-text">Session ends when you tap your NFC tag.</p>

      <button class="btn-check" id="btn-refresh">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Check now
      </button>
      <p class="refresh-msg" id="refresh-msg"></p>

      <div class="footer">
        <img class="footer-wordmark" src="icons/zeyt-wordmark-light.svg" alt="zeyt" />
      </div>
    </div>

    <script src="blocked.js"></script>
  </body>
</html>
